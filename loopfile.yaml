# AIKnowledgeCMS Loopfile — aiknowledgecms.exbridge.jp (参照実装)
# ループ全体（KPI・ケイデンス・予算・ゲート・エスカレーション）をこの1枚で宣言する。

site: https://aiknowledgecms.exbridge.jp
env_file: /home/kojima/work/aixec/.env   # FTP_* / SMTP_* を読む(値はコミットしない)

kpi: [pv_24h, uniq_ips_24h, pages_healthy]

cadence:
  sense: hourly       # systemd timer が起動する(コード側は表示用)
  create: daily       # Phase 2
  act: weekly         # Phase 3

# SENSE: 有効なセンサ
sensors: [http_health, simpletrack, gsc]

# GSC(Search Console)センサ — 集客ループの心臓部。
# credentials_file が無い間は自動スキップ。設定手順:
#   1. GCPでサービスアカウント作成 → JSONキーを下記パスに保存
#   2. Search Consoleの「設定→ユーザーと権限」でそのメールを閲覧者として追加
gsc:
  auth: gcloud   # kgrowthと同じADC認証(quota projectはADCファイルから自動取得)
  property: https://aiknowledgecms.exbridge.jp/
  opportunity_min_impressions: 20

# RESEARCH: コレクタ(毎tick・軽量)
research:
  feeds:
    - https://hnrss.org/frontpage
    - https://hnrss.org/newest?q=AI+agent
    - https://techcrunch.com/category/artificial-intelligence/feed/
  niche_keywords: [agent, agents, mcp, x402, a2a, claude, codex, llm, monetiz,
                   autonomous, crypto, payment, stablecoin, openai, anthropic]
  max_items_per_tick: 30

# CREATE: 記事生成(日次・予算内)
create:
  articles_per_day: 1
  max_attempts_per_day: 2      # ゲート不合格時の再試行込み上限
  ollama_api: http://192.168.0.3:11434
  generator:
    kind: ollama               # ollama / cli (agent_cliを使用)
    model: gemma4:12b-it-qat
  verifier:
    kind: ollama
    model: gemma4:12b-it-qat   # 検証は同モデルでも別呼び出し(温度0.1)で分離
  language: ja
  theme: >
    AIエージェント経済(エージェントに仕事をさせて稼ぐ・x402/MCP/A2A・
    AIによる収益化・自律エージェントの実務応用)についての短い考察記事。

http_health:
  watch_pages:
    - /
    - /index.html
    - /aiknowledgecms.html
    - /aiknowledgesns.php
    - /sitemap.php
    - /loop/latest.html
    - /articles/

simpletrack:
  ftp_log_path: /web/aiknowledgecms_exbridge_jp/access.log
  tail_bytes: 2000000   # 末尾2MBだけFTPで取得して解析(全量DLしない)

# TRIAGE: ルールしきい値
thresholds:
  pv_drop_pct: 30        # 前tick比でこの%以上PVが落ちたらissue
  slow_page_ms: 4000     # 応答がこれより遅いページはissue

# DISTRIBUTE
publisher:
  kind: ftp
  remote_dir: /web/aiknowledgecms_exbridge_jp/loop        # ループレポート
  articles_dir: /web/aiknowledgecms_exbridge_jp/articles  # 生成記事
announcer:
  kind: aixsns
  api: https://aixec.exbridge.jp/api.php?path=posts
  author: codex

# ガードレール
budgets:
  llm_cost_per_tick_usd: 0   # Phase 1 はLLM未使用
escalate_when:
  - critical_issue_opened    # criticalなissueが新規に開いたらメール
escalation:
  email: katsushi2441@gmail.com

# エージェント実行器(Phase 2以降でステージに接続)
agent_cli: "claude -p"
