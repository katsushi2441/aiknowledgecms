# AIKnowledgeCMS Loopfile — aiknowledgecms.exbridge.jp (参照実装)
# ループ全体（KPI・ケイデンス・予算・ゲート・エスカレーション）をこの1枚で宣言する。

site: https://aiknowledgecms.exbridge.jp
env_file: /home/kojima/work/aixec/.env   # FTP_* / SMTP_* を読む(値はコミットしない)

kpi: [pv_new_24h, uniq_ips_new_24h, pages_healthy, kurage_clicks_sent_24h]  # 新システムのみ(旧システム遺産PVは参考値)

cadence:
  sense: hourly       # systemd timer が起動する(コード側は表示用)
  create: daily       # Phase 2
  act: weekly         # Phase 3

# SENSE: 有効なセンサ
sensors: [http_health, simpletrack, gsc, gsc_network, kurage_clicks]

# gsc_network: 全プロパティ横断の「検索流入が伸びているクエリ+受けページ」検知。
# oss.phpのOfficeCLI流入増を人間が目視で見つけて記事化指示した流れの自動化
# (2026-07-11)。伸びたクエリは記事化(解説+受けページへ送客)の題材になる。
gsc_network:
  properties:
    - https://aiknowledgecms.exbridge.jp/
    - https://kurage.exbridge.jp/
    - https://aixec.exbridge.jp/
  min_clicks: 2          # 直近7日クリックがこれ以上で
  min_impressions: 40    # またはこれ以上の表示があり
  rise_factor: 1.5       # 前週比この倍率以上に伸びていたら題材化
  max_new_per_tick: 3

# ACT (Phase 3): 課題キューの自動処置。未インデックス記事の再公開など。
# 2026-07-12: 未インデックス課題の検知(毎tick3記事巡回)が処置予算(2/日)を
# 上回るペースで積み上がった(バックログ15件)ため5/日に増やす。republishは
# FTP2アップロードのみで軽く、7日クールダウンもあるため安全側。
act:
  treatments_per_day: 5

# GSC(Search Console)センサ — 集客ループの心臓部。
# credentials_file が無い間は自動スキップ。設定手順:
#   1. GCPでサービスアカウント作成 → JSONキーを下記パスに保存
#   2. Search Consoleの「設定→ユーザーと権限」でそのメールを閲覧者として追加
gsc:
  auth: gcloud   # kgrowthと同じADC認証(quota projectはADCファイルから自動取得)
  property: https://aiknowledgecms.exbridge.jp/
  opportunity_min_impressions: 20
  # Phase 4 (MEASURE)
  position_band_min_impressions: 10  # 2ページ目(11-20位)機会検知の最低表示回数
  track_min_impressions: 20          # 順位を追跡するクエリの最低表示回数
  position_drop_threshold: 5         # この順位数以上落ちたらTRIAGEへ
  refresh_min_age_days: 7            # リライト対象は公開からこの日数以上
  refresh_min_impressions: 30        # リライト対象の最低表示回数

# RESEARCH: コレクタ(毎tick・軽量)
research:
  feeds:
    - https://hnrss.org/frontpage
    - https://hnrss.org/newest?q=AI+agent
    - https://techcrunch.com/category/artificial-intelligence/feed/
  niche_keywords: [agent, agents, mcp, x402, a2a, claude, codex, llm, monetiz,
                   autonomous, crypto, payment, stablecoin, openai, anthropic]
  max_items_per_tick: 30

# CREATE: 記事生成(日次・予算内)
create:
  articles_per_day: 2          # 2026-07-11: GSCオポチュニティ起点の解説記事を厚くするため1→2に増枠
  max_attempts_per_day: 4      # ゲート不合格時の再試行込み上限(枠増に合わせ2→4)
  # 2026-07-14: 3→1に減枠。insight記事の題材が動画由来でサイトテーマ(AIエージェント経済)
  # から外れがち(車・交通系IC・芸能など)、未インデックスのまま滞留していた。
  # 本数よりテーマの一貫性(トピックオーソリティ)を優先する。
  video_insight_per_day: 1
  video_insight_max_attempts_per_day: 2
  ollama_api: http://192.168.0.3:11434
  generator:
    kind: ollama               # ollama / cli (agent_cliを使用)
    model: gemma4:12b-it-qat
  verifier:
    kind: ollama
    model: gemma4:12b-it-qat   # 検証は同モデルでも別呼び出し(温度0.1)で分離
  language: ja
  theme: >
    AIエージェント経済(エージェントに仕事をさせて稼ぐ・x402/MCP/A2A・
    AIによる収益化・自律エージェントの実務応用)についての短い考察記事。

# DIGEST: 外部サイト監視→新着紹介記事(拡散ハブ)。1日1本/ソース。
# 素材はvideosコレクタが毎tick収集し、researchのURL一意性で重複防止。
# 未紹介分は古い順に最大max_items本ずつ記事化して前進していく。
digests:
  - name: kuragev
    kind: kuragev
    label: Kurage AIショート動画
    api: http://127.0.0.1:18303/jobs?limit=50   # 多い日は30本/日追加されるため多めに巡回
    public_base: "https://kurage.exbridge.jp/kuragev.php?id="
    link_ref: akc     # 記事内の動画リンクに ?ref=akc を付けて送客を計測する
    # 2026-07-14: 3→1に減枠。送客実測でダイジェスト記事経由は0〜1クリック/日、
    # ウィジェット経由が16〜66クリック/日と、送客はウィジェットが担っており、
    # 記事群は未インデックスの薄いリンク集としてサイト品質を下げるだけだった。
    per_day: 1
    max_items: 10
  - name: youtube
    kind: youtube_rss
    label: KurageプロジェクトのYouTubeチャンネル
    feed: https://www.youtube.com/feeds/videos.xml?channel_id=UCL2iSxgzwm5frZNjIfiTauA
    per_day: 1
    max_items: 10

http_health:
  watch_pages:
    - /
    - /index.html
    - /aiknowledgecms.html
    - /aiknowledgesns.php
    - /sitemap.php
    - /loop/latest.html
    - /articles/
    - /dashboard.html

simpletrack:
  ftp_log_path: /web/aiknowledgecms_exbridge_jp/access.log
  tail_bytes: 2000000   # 末尾2MBだけFTPで取得して解析(全量DLしない)

# 送客KPI: kurage.exbridge.jp側のaccess.logから、当サイト発の動画クリックを測る。
# ref=akc(ダイジェスト記事) / ref=akc-w(最新動画ウィジェット) を区別して集計。
kurage_clicks:
  ftp_log_path: /web/kurage_exbridge_jp/access.log
  tail_bytes: 2000000
  video_path: kuragev.php

# TRIAGE: ルールしきい値
thresholds:
  pv_drop_pct: 30        # 前tick比でこの%以上PVが落ちたらissue
  slow_page_ms: 4000     # 応答がこれより遅いページはissue
  gsc_clicks_drop_pct: 20  # GSCクリック28d合計が24h前比この%以上減でissue (Phase 4)
  reject_rate_pct: 70    # 48hの生成却下率がこの%以上(試行4回以上)でissue (Phase 3)

# DISTRIBUTE
publisher:
  kind: ftp
  remote_dir: /web/aiknowledgecms_exbridge_jp/loop        # ループレポート
  articles_dir: /web/aiknowledgecms_exbridge_jp/articles  # 生成記事
announcer:
  kind: aixsns
  api: https://aixec.exbridge.jp/api.php?path=posts
  author: codex
# 記事公開時に配信するチャネル(上から順に実行・失敗しても他は続行)
announcers: [aixsns, hatena_blogger, kurage_video]
# 週次一次データレポート(自DB実測・LLM非使用)
weekly_report:
  enabled: true

# ガードレール
budgets:
  llm_cost_per_tick_usd: 0   # Phase 1 はLLM未使用
escalate_when:
  - critical_issue_opened    # criticalなissueが新規に開いたらメール
escalation:
  email: katsushi2441@gmail.com

# エージェント実行器(Phase 2以降でステージに接続)
agent_cli: "claude -p"
